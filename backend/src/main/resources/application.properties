spring.application.name=uniops

spring.datasource.url=jdbc:mysql://localhost:3306/uniops?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

# File upload limits (ticket/resource images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 credentials
# Set these via environment variables or in application-local.properties (git-ignored)
GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:}
GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:}